name: Android CI/APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # இந்த ஸ்டெப் மிக முக்கியம்! 
    # இது gradlew இல்லாமலேயே Gradle 8.2-ஐ GitHub-ல் செட் செய்யும்.
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2 

    # நேரடியாக 'gradle' கமாண்ட் மூலம் பில்ட் செய்கிறோம்
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LyraSaver-APK
        path: app/build/outputs/apk/debug/*.apk