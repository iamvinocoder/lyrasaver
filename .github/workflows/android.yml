name: Build & Deploy Android App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Build with Gradle
        run: ./gradlew build
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease
      
      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: lyra-saver-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Release Bundle to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: lyra-saver-release-bundle
          path: app/build/outputs/bundle/release/app-release.aab
      
      - name: Run Unit Tests
        run: ./gradlew test
      
      - name: Run Lint
        run: ./gradlew lint

  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Run Unit Tests
        run: ./gradlew test
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: app/build/reports/tests/

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Run Lint
        run: ./gradlew lint
      
      - name: Upload Lint Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
