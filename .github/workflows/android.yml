name: Android CI/APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # நேரடியாக Gradle-ஐ இன்ஸ்டால் செய்து ரன் செய்யும் முறை
    - name: Install Gradle
      run: |
        sudo apt-get update
        sudo apt-get install gradle -y

    # gradlew பயன்படுத்தாமல் நேரடியாக 'gradle' கமாண்ட் மூலம் பில்ட் செய்தல்
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LyraSaver-APK
        path: app/build/outputs/apk/debug/*.apk