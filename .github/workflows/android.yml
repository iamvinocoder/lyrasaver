name: Android CI/APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # இந்த ஸ்டெப் தான் முக்கியமான மாற்றம் (gradlew தேவையில்லை)
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        arguments: assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LyraSaver-APK
        path: app/build/outputs/apk/debug/*.apk